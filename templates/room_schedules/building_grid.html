{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ building.name }}</title>
    <link rel="stylesheet" href="{% static 'room_schedules/edgel/css/edgel-blue-university.min.css' %}">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
    </style>
</head>
<body>

<div class="card card-display" data-bs-page-reload-seconds="300" data-bs-browser-time="true">

    <!-- Header: logo | building name | clock -->
    <header class="card-header">
        <img class="masthead-logo" src="{% static 'room_schedules/edgel/media/uoe-logo.png' %}" alt="University of Edinburgh">
        <h1 class="display-heading">{{ building.name }}</h1>
        <div class="display-clock"></div>
    </header>

    <!-- Body: schedule grid -->
    <main class="card-body">

        <!-- Room rows with events (time axis is auto-generated by EdGEL JS) -->
        <div class="display-schedule" style="--edgel-schedule-start-hour:{{ start_hour }}; --edgel-schedule-end-hour:{{ end_hour }};">
            {% for rs in room_statuses %}
            <div class="display-schedule-row">
                <div class="display-schedule-room" style="--edgel-schedule-row:{{ forloop.counter }};">
                    {{ rs.room.name }}
                </div>
                {% for event in rs.events %}
                <div class="display-schedule-event{% if event == rs.current_event %} display-highlight{% endif %}"
                     style="--edgel-schedule-row:{{ forloop.parentloop.counter }}; --edgel-start-minutes:{{ event.grid_start_minutes }}; --edgel-end-minutes:{{ event.grid_end_minutes }};"
                     title="{{ event.start_time|time:'H:i' }} – {{ event.end_time|time:'H:i' }}">
                    {{ event.name }}
                </div>
                {% endfor %}
                {% if not rs.events %}
                <div class="display-schedule-comment" style="--edgel-schedule-row:{{ forloop.counter }};">
                    No events to show
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>

    </main>

    <!-- Footer -->
    <footer class="card-footer">
        <div class="small text-end" data-provide="uoe-refreshed">Last refreshed:</div>
    </footer>

</div>

<script src="{% static 'room_schedules/edgel/js/edgel.bundle.min.js' %}"></script>
<script>EdGEL.Consent.Default.disabled = true;</script>
<script>
    // ── Poll for changes ──
    var STATE_HASH_URL = "{% url 'room_schedule/building_state_hash' venue_id=building.pk %}";
    var lastStateHash = null;
    var hashPollFailures = 0;

    function pollStateHash() {
        fetch(STATE_HASH_URL)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                hashPollFailures = 0;
                if (lastStateHash === null) {
                    lastStateHash = data.hash;
                } else if (data.hash !== lastStateHash) {
                    location.reload();
                }
            })
            .catch(function() {
                hashPollFailures++;
                if (hashPollFailures >= 5) location.reload();
            });
    }

    pollStateHash();
    setInterval(pollStateHash, 10000);
</script>

</body>
</html>
