{% load static %}
<!doctype html>
<html lang="en-GB">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>{{ title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="{% static 'room_schedules/edgel/js/edgel.bundle.min.js' %}"></script>
    <script>EdGEL.Consent.Default.disabled = true;</script>
    <link rel="stylesheet" type="text/css" href="{% static 'room_schedules/edgel/css/edgel-blue-university.min.css' %}">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
    </style>
</head>
<body>

<div class="card card-display"
     data-bs-animate="true"
     data-bs-page-reload-seconds="300"
     data-bs-page-hold-seconds="15"
     data-bs-screensaver-seconds="0"
     style="--edgel-schedule-start-hour:{{ start_hour }}; --edgel-schedule-end-hour:{{ end_hour }};">

    <header role="banner" class="card-header">
        <img class="masthead-logo" src="{% static 'room_schedules/edgel/media/uoe-logo.png' %}" alt="The University of Edinburgh logo">
        <h1 class="display-heading">{{ title }}</h1>
        <div class="display-clock"></div>
    </header>

    <main class="card-body" data-provide="uoe-display">
        <dl class="display-schedule">
            {% for rs in room_statuses %}
            <div class="display-schedule-row" style="--edgel-schedule-row:{{ forloop.counter }};">
                <dt class="display-schedule-room">{{ rs.room.label }}</dt>
                {% for event in rs.events %}
                <dd class="display-schedule-event{% if event == rs.current_event %} display-highlight{% endif %}"
                    style="--edgel-start-minutes:{{ event.grid_start_minutes }}; --edgel-end-minutes:{{ event.grid_end_minutes }};">
                    <span class="visually-hidden">{{ event.start_time|time:'H:i' }} – {{ event.end_time|time:'H:i' }}</span>
                    {{ event.name }}
                </dd>
                {% empty %}
                <dd class="display-schedule-comment">No bookings</dd>
                {% endfor %}
            </div>
            {% endfor %}
        </dl>
    </main>

    <footer class="card-footer">
        <div></div>
        <div class="small text-end" data-provide="uoe-refreshed">Last refreshed:</div>
    </footer>

</div>

<div class="modal hero-bg" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"><div class="modal-dialog"></div></div>

<script>
    var STATE_HASH_URL = "{{ state_hash_url }}";
    var lastStateHash = null;
    var hashPollFailures = 0;

    function pollStateHash() {
        fetch(STATE_HASH_URL)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                hashPollFailures = 0;
                if (lastStateHash === null) {
                    lastStateHash = data.hash;
                } else if (data.hash !== lastStateHash) {
                    location.reload();
                }
            })
            .catch(function() {
                hashPollFailures++;
                if (hashPollFailures >= 5) location.reload();
            });
    }

    pollStateHash();
    setInterval(pollStateHash, 10000);
</script>

</body>
</html>
